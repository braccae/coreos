name: Auto-retry Failed Workflows

on:
  workflow_run:
    workflows:
      - "Update ZFS Version"
      - "Kmods Container"
      - "Alma Container"
      - "Workstation Container"
      - "Laptop Container"
      - "K3s Container"
      - "Installer Container"
      - "Dockerhost Container"
      - "HCI Container"
      - "SELinux Policy"
      - "Build and push qcow2 image"
    types:
      - completed

jobs:
  retry:
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.run_attempt < 3
    permissions:
      actions: write
    steps:
      - name: Wait before retrying (delay for transient issues to resolve)
        run: |
          echo "Waiting 120 seconds before retrying..."
          sleep 120

      - name: Rerun failed jobs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Triggering retry for run ID: ${{ github.event.workflow_run.id }} (Attempt: ${{ github.event.workflow_run.run_attempt }})"
          gh run rerun ${{ github.event.workflow_run.id }} --failed --repo ${{ github.repository }}

name: Kmods Container

on:
  push:
    branches: ["main", "feat/kmods-kernel-check"]
    paths:
      - "kmods.Containerfile"
      - "kmods-bundle.Containerfile"
      - "build/scripts/build-zfs.sh"
      - ".github/workflows/container-kmods.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: kmods

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: fedora
            base_image: quay.io/fedora/fedora-bootc:43
          - variant: alma
            base_image: quay.io/almalinuxorg/almalinux-bootc:10
          - variant: bazzite
            base_image: ghcr.io/ublue-os/bazzite:stable-43
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Build Kmods
        uses: redhat-actions/buildah-build@v2
        id: build
        with:
          context: .
          containerfiles: ./kmods.Containerfile
          image: kmods-${{ matrix.variant }}
          tags: build
          extra-args: |
            --secret id=LOCALMOK,env=LOCALMOK
            --build-arg BASE_IMAGE=${{ matrix.base_image }}

      - name: Extract RPMs from built image
        run: |
          CONTAINER=$(buildah from kmods-${{ matrix.variant }}:build)
          MOUNT=$(buildah mount "$CONTAINER")
          mkdir -p rpms
          cp -r "$MOUNT/zfs/"* rpms/
          buildah umount "$CONTAINER"
          buildah rm "$CONTAINER"
          echo "Extracted RPMs for ${{ matrix.variant }}:"
          ls -la rpms/

      - name: Upload RPMs artifact
        uses: actions/upload-artifact@v4
        with:
          name: zfs-rpms-${{ matrix.variant }}
          path: rpms/
          retention-days: 1

  bundle:
    runs-on: ubuntu-24.04
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Download Fedora RPMs
        uses: actions/download-artifact@v4
        with:
          name: zfs-rpms-fedora
          path: zfs/fedora/

      - name: Download Alma RPMs
        uses: actions/download-artifact@v4
        with:
          name: zfs-rpms-alma
          path: zfs/alma/

      - name: Download Bazzite RPMs
        uses: actions/download-artifact@v4
        with:
          name: zfs-rpms-bazzite
          path: zfs/bazzite/

      - name: Verify bundle contents
        run: |
          echo "=== Bundle contents ==="
          find zfs/ -type f | sort
          echo ""
          echo "=== Kernel versions ==="
          for variant in fedora alma bazzite; do
            echo "$variant: $(cat zfs/$variant/kernel-version.txt)"
          done

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: redhat-actions/podman-login@v1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Bundle Image
        uses: redhat-actions/buildah-build@v2
        id: build-bundle
        with:
          context: .
          containerfiles: ./kmods-bundle.Containerfile
          image: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: latest

      - name: Push To Registry
        if: github.event_name != 'pull_request'
        uses: redhat-actions/push-to-registry@v2
        id: push
        with:
          registry: ${{ env.REGISTRY }}
          image: ${{ steps.build-bundle.outputs.image }}
          tags: ${{ steps.build-bundle.outputs.tags }}
